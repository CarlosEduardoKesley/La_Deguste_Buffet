# nginx/proxy.conf — Reverse Proxy principal

# Limita requisições (proteção básica contra DDoS)
limit_req_zone $binary_remote_addr zone=ladeguste_limit:10m rate=20r/s;

server {
    listen 80;
    server_name localhost;   # Troque pelo seu domínio: ladeguste.com.br

    # Redireciona HTTP → HTTPS (descomente quando tiver SSL)
    # return 301 https://$host$request_uri;

    # ── Proxy para o serviço do site ──
    location / {
        limit_req zone=ladeguste_limit burst=40 nodelay;

        proxy_pass         http://site:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Esconder versão
    server_tokens off;

    # Headers de segurança
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}

